<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非官方老师社区治理 - 产品Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    },
                    fontFamily: { sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .phone-frame { border: 12px solid #1f2937; border-radius: 40px; overflow: hidden; position: relative; background: #fff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #1f2937; border-radius: 0 0 20px 20px; z-index: 50; }
        .phone-inner { position: absolute; top: 28px; left: 0; right: 0; bottom: 0; overflow: hidden; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid #f3f4f6; z-index: 20; }
        .page-container { height: 100%; display: flex; flex-direction: column; padding-bottom: 60px; }
        .page-scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .page-scroll::-webkit-scrollbar { display: none; }
        .cover-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-5 flex items-center gap-3 bg-white rounded-full px-5 py-2.5 shadow-sm border border-gray-200">
        <span class="text-sm text-gray-500 font-medium">切换视角：</span>
        <select id="roleSelector" onchange="switchRole(this.value)" class="text-sm bg-transparent border-none focus:ring-0 text-gray-900 font-medium cursor-pointer">
            <option value="teacher_unsubmitted">待认证老师（未提交）</option>
            <option value="teacher_rejected">待认证老师（不通过）</option>
            <option value="visitor">访客查看未认证老师</option>
            <option value="official_teacher">官方认证老师主页</option>
        </select>
    </div>

    <div class="phone-frame w-[375px] h-[750px]">
        <div class="phone-notch"></div>
        <div class="phone-inner" id="phoneInner"></div>
    </div>

<script>
let currentRole = 'teacher_unsubmitted';
const userData = {
    nickname: 'Teacher_Alice',
    htId: '@teacher_alice_2024',
    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Alice',
    bio: 'Hello friends! 👋 My name is Alice. I\'m a 28-year-old English teacher. Looking forward to helping you improve your English!'
};

function switchRole(role) {
    currentRole = role;
    if (role === 'teacher_unsubmitted') renderChatPage('unsubmitted');
    else if (role === 'teacher_rejected') renderChatPage('rejected');
    else if (role === 'visitor') renderVisitorPage();
    else if (role === 'official_teacher') renderOfficialTeacherPage();
}

function getTabBar(activeTab) {
    const tabs = [
        { id: 'home', label: '首页', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { id: 'discover', label: '发现', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
        { id: 'messages', label: '消息', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
        { id: 'me', label: '我的', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' }
    ];
    return `<div class="tab-bar flex justify-around items-center">
        ${tabs.map(t => {
            const isActive = t.id === activeTab;
            const color = isActive ? 'text-brand-600' : 'text-gray-400';
            const weight = isActive ? 'font-medium' : '';
            let onclick = '';
            if (t.id === 'messages') onclick = `onclick="renderChatPage(currentRole === 'teacher_rejected' ? 'rejected' : 'unsubmitted')"`;
            else if (t.id === 'me') onclick = `onclick="renderProfilePage(currentRole === 'teacher_rejected' ? 'rejected' : 'unsubmitted')"`;
            return `<div class="flex flex-col items-center ${color} gap-0.5 cursor-pointer" ${onclick}>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${t.icon}"/></svg>
                <span class="text-[10px] ${weight}">${t.label}</span>
            </div>`;
        }).join('')}
    </div>`;
}

/* ============================
   1. 聊天列表页
   ============================ */

                </div>
                <div>

                        <div class="flex-1 min-w-0">

                                <h3 class="text-sm font-semibold text-gray-900">HelloTalk 官方</h3>

                    </div>
                    <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-50 active:bg-gray-50">

/* ============================
   Profile 公共头部组件
   ============================ */
function getProfileHeader(hasBanner, bannerStatus) {
    const bannerHtml = hasBanner ? `
        <div class="mt-3" id="profileBanner">
            <div onclick="showTeacherModal('${bannerStatus}')" class="${bannerStatus === 'unsubmitted' ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-red-50 border-red-200 text-red-800'} border rounded-xl p-3 flex items-center gap-2 cursor-pointer active:opacity-80">
                <svg class="w-4 h-4 ${bannerStatus === 'unsubmitted' ? 'text-amber-500' : 'text-red-500'} flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span class="text-xs font-medium flex-1">${bannerStatus === 'unsubmitted' ? '你还未完成老师认证' : '你的老师认证申请未通过'}</span>

            </div>
        </div>
    ` : '';

    return `
        <!-- 封面背景 -->
        <div class="h-36 cover-bg relative overflow-hidden">
            <div class="absolute inset-0 flex items-center justify-center opacity-30">
                <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3zM3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"/></svg>
            </div>
            <div class="absolute top-3 right-3 bg-black/20 backdrop-blur-sm text-white text-xs px-2 py-1 rounded-full flex items-center gap-1">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"/></svg>
                <span>209</span>
            </div>
        </div>

        <!-- 用户信息区 -->
        <div class="px-4 relative">
            <!-- 头像（与封面对齐，左对齐） -->
            <div class="absolute -top-10 left-4">
                <div class="w-20 h-20 rounded-full border-4 border-white bg-white shadow-lg overflow-hidden relative">
                    <img src="${userData.avatar}" class="w-full h-full object-cover" alt="avatar">
                    <div class="absolute -bottom-0.5 -right-0.5 w-6 h-6 rounded-full overflow-hidden border-2 border-white bg-red-500 flex items-center justify-center text-[10px]">🇺🇸</div>
                </div>
            </div>

            <div class="pt-11">
                <!-- 昵称行 -->
                <div class="flex items-center gap-2 flex-wrap">
                    <h2 class="text-xl font-bold text-gray-900">${userData.nickname}</h2>
                    <span class="text-blue-500 text-sm">♂31</span>
                    <span class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">VIP</span>
                    <span class="text-blue-400 text-xs">❄️25</span>
                </div>

                <!-- HT ID -->
                <div class="flex items-center gap-1 mt-0.5">
                    <span class="text-sm text-gray-500">${userData.htId}</span>
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>

                <!-- 语言标签 -->
                <div class="flex gap-3 mt-2">
                    <div class="text-xs text-gray-600 flex items-center gap-0.5"><span class="font-semibold text-gray-800">EN</span><span class="text-gray-400">英语</span></div>
                    <div class="text-xs text-gray-600 flex items-center gap-0.5"><span class="font-semibold text-gray-800">RU</span><span class="text-gray-400">俄语</span></div>
                    <div class="text-xs text-gray-600 flex items-center gap-0.5"><span class="font-semibold text-gray-800">CN</span><span class="text-gray-400">中文</span></div>
                    <div class="text-xs text-gray-600 flex items-center gap-0.5"><span class="font-semibold text-gray-800">ES</span><span class="text-gray-400">西班牙语</span></div>
                </div>

                <!-- 统计 -->
                <div class="flex gap-4 mt-3 text-xs text-gray-600">
                    <span><strong class="text-gray-900 text-sm">1.2k</strong> 正在关注</span>
                    <span><strong class="text-gray-900 text-sm">5.6k</strong> 粉丝</span>
                    <span><strong class="text-gray-900 text-sm">365</strong> 天连胜</span>
                    <span><strong class="text-gray-900 text-sm">136</strong> 天加入</span>
                </div>

                ${bannerHtml}

                <!-- Bio -->
                <div class="mt-3 text-sm text-gray-700 leading-relaxed">${userData.bio}</div>
            </div>
        </div>
    `;
}

function checkTeacherKeyword() {
    const nickname = document.getElementById('nicknameInput').value;
    const htId = document.getElementById('htIdInput').value;
    const saveBtn = document.getElementById('saveBtn');

    document.getElementById('nicknameWarning').classList.toggle('hidden', !/teacher/i.test(nickname));
    document.getElementById('htIdWarning').classList.toggle('hidden', !/teacher/i.test(htId));
    document.getElementById('nicknameTip').classList.toggle('hidden', !/teacher/i.test(nickname));
    document.getElementById('htIdTip').classList.toggle('hidden', !/teacher/i.test(htId));

    const changed = nickname !== userData.nickname || htId !== userData.htId;
    saveBtn.disabled = !changed;
}

function saveProfile() {
    const nickname = document.getElementById('nicknameInput').value;
    const htId = document.getElementById('htIdInput').value;
    userData.nickname = nickname;
    userData.htId = htId;
    const stillHasTeacher = /teacher/i.test(nickname) || /teacher/i.test(htId);

    if (stillHasTeacher) {
        showToast('资料已保存，但昵称/ID 仍含「Teacher」，Banner 将持续展示');
    } else {
        document.getElementById('saveBanner').classList.remove('hidden');
        setTimeout(() => showToast('资料已保存，主页提示 Banner 已移除'), 300);
    }
}

                            <span class="text-xs text-gray-500">1:12</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="border-b border-gray-50 pb-3">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden">
                                    <img src="${userData.avatar}" class="w-full h-full">
                                </div>
                                <div>
                                    <div class="text-sm font-semibold text-gray-900">Teacher_Bob</div>
                                    <div class="text-xs text-gray-400">3小时前</div>
                                </div>
                            </div>
                            <p class="text-sm text-gray-700">New IELTS speaking course is now open for enrollment! Limited spots available. 🎯</p>
                        </div>
                    </div>
                </div>
            </div>
            ${getTabBar('me')}
        </div>
    `;
}

/* ============================
   通用工具函数
   ============================ */
function toggleVisitorTooltip(element) {
    const tooltip = element.querySelector('#visitorTooltip');
    if (tooltip) tooltip.classList.toggle('hidden');
}
function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.remove();
}
function showToast(message) {
    const phoneInner = document.getElementById('phoneInner');
    const toast = document.createElement('div');
    toast.className = 'absolute top-4 left-4 right-4 bg-gray-900 text-white text-sm py-3 px-4 rounded-xl text-center z-[70] fade-in';
    toast.textContent = message;
    phoneInner.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2000);
}

// 初始化
switchRole('teacher_unsubmitted');
</script>
